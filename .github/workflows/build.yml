name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.5"
          channel: stable

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK (save full log)
        run: |
          flutter build apk --release --verbose 2>&1 | tail -100 > build_output.txt
          cat build_output.txt
          ls build/app/outputs/flutter-apk/ 2>/dev/null || echo "APK not found"

      - name: Commit log and APK to repo
        if: always()
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add build_output.txt
          if [ -f build/app/outputs/flutter-apk/app-release.apk ]; then
            mkdir -p releases
            cp build/app/outputs/flutter-apk/app-release.apk releases/sarkoob.apk
            git add releases/sarkoob.apk
            echo "APK_BUILT=true" >> $GITHUB_ENV
          fi
          git commit -m "ci: build output [skip ci]" || echo "nothing to commit"
          git push || echo "push failed"
