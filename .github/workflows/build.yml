name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      - name: Download Vazirmatn font
        run: |
          mkdir -p assets/fonts assets/images assets/animations
          curl -L "https://github.com/rastikerdar/vazirmatn/releases/download/v33.003/Vazirmatn-fonts.zip" -o vazirmatn.zip
          unzip -j vazirmatn.zip "fonts/Vazirmatn-Regular.ttf" "fonts/Vazirmatn-Bold.ttf" "fonts/Vazirmatn-Light.ttf" -d assets/fonts/ || true
          # fallback: try direct download
          curl -L "https://github.com/rastikerdar/vazirmatn/raw/master/fonts/Vazirmatn-Regular.ttf" -o assets/fonts/Vazirmatn-Regular.ttf || true
          curl -L "https://github.com/rastikerdar/vazirmatn/raw/master/fonts/Vazirmatn-Bold.ttf" -o assets/fonts/Vazirmatn-Bold.ttf || true
          curl -L "https://github.com/rastikerdar/vazirmatn/raw/master/fonts/Vazirmatn-Light.ttf" -o assets/fonts/Vazirmatn-Light.ttf || true
          ls -la assets/fonts/

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --no-obfuscate

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sarkoob-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: v${{ github.run_number }}
          name: سرکوب v${{ github.run_number }}
          files: build/app/outputs/flutter-apk/app-release.apk
          body: |
            ## سرکوب - بازی مافیا
            این نسخه به صورت خودکار ساخته شده است.
            فایل APK را دانلود و روی گوشی نصب کنید.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
