name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.5"
          channel: stable

      - name: Get dependencies
        run: flutter pub get

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Run Gradle directly to see real error
        run: |
          cd android
          ./gradlew assembleRelease 2>&1 | tee ../gradle_real.txt || true

      - name: Flutter build
        run: flutter build apk --release 2>&1 | tee flutter_real.txt || true

      - name: Save logs to repo
        if: always()
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          cat gradle_real.txt flutter_real.txt > build_output.txt 2>/dev/null || true
          if [ -f build/app/outputs/flutter-apk/app-release.apk ]; then
            mkdir -p releases
            cp build/app/outputs/flutter-apk/app-release.apk releases/sarkoob.apk
            git add releases/sarkoob.apk
          fi
          git add build_output.txt gradle_real.txt flutter_real.txt 2>/dev/null || true
          git commit -m "ci: logs [skip ci]" || true
          git push || true
