name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      - name: Create asset directories and download fonts
        run: |
          mkdir -p assets/fonts assets/images assets/animations
          touch assets/images/.gitkeep
          touch assets/animations/.gitkeep
          curl -fL "https://github.com/rastikerdar/vazirmatn/raw/master/fonts/Vazirmatn-Regular.ttf" -o assets/fonts/Vazirmatn-Regular.ttf
          curl -fL "https://github.com/rastikerdar/vazirmatn/raw/master/fonts/Vazirmatn-Bold.ttf" -o assets/fonts/Vazirmatn-Bold.ttf
          curl -fL "https://github.com/rastikerdar/vazirmatn/raw/master/fonts/Vazirmatn-Light.ttf" -o assets/fonts/Vazirmatn-Light.ttf

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos 2>&1 | tee /tmp/analyze.log || true

      - name: Build APK and capture errors
        run: |
          flutter build apk --release 2>&1 | tee /tmp/build.log
          echo "Exit code: ${PIPESTATUS[0]}"

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            /tmp/build.log
            /tmp/analyze.log
          retention-days: 7

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: sarkoob-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: سرکوب v${{ github.run_number }}
          files: build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
