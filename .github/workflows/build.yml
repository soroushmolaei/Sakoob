name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.5"
          channel: stable

      - name: Get dependencies
        run: flutter pub get

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Run Gradle
        run: |
          cd android
          ./gradlew assembleRelease 2>&1 | tee ../gradle_out.txt || true

      - name: Flutter build
        run: flutter build apk --release 2>&1 | tee flutter_out.txt || true

      - name: Save APK and logs to repo
        if: always()
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          if [ -f build/app/outputs/flutter-apk/app-release.apk ]; then
            mkdir -p releases
            cp build/app/outputs/flutter-apk/app-release.apk releases/sarkoob.apk
            git add releases/sarkoob.apk
            echo "APK SAVED" > build_status.txt
          else
            echo "APK NOT FOUND" > build_status.txt
            cat gradle_out.txt >> build_status.txt 2>/dev/null || true
            cat flutter_out.txt >> build_status.txt 2>/dev/null || true
          fi
          git add build_status.txt gradle_out.txt flutter_out.txt 2>/dev/null || true
          git commit -m "ci: build result [skip ci]" || echo "nothing to commit"
          git push || echo "push failed"
