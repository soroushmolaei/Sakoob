name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sarkoob-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Copy APK to repo and push
        run: |
          mkdir -p releases
          cp build/app/outputs/flutter-apk/app-release.apk releases/sarkoob-latest.apk
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add releases/sarkoob-latest.apk
          git commit -m "release: update APK [skip ci]" || echo "No changes"
          git push
